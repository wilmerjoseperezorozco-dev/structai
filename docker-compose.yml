# ══════════════════════════════════════════════════════════════
# INGENIERA NSR-10 PLATFORM — docker-compose (desarrollo local)
# Costo: $0 — todo local. Para GCP: migrar a Cloud Run + Cloud SQL
# ══════════════════════════════════════════════════════════════
version: '3.9'

services:

  # ── Frontend Next.js ──────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    depends_on: [api]
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next

  # ── API FastAPI (Motor APU + RAG) ─────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports: ["8000:8000"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - API_SECRET=${API_SECRET}
    volumes:
      - ./apps/api:/app
      - ./packages:/packages
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── N8N (Bot Telegram + Workflows) ────────────────────────
  n8n:
    image: n8nio/n8n:latest
    ports: ["5678:5678"]
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-admin123}
      - WEBHOOK_URL=http://localhost:5678
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NSR10_API_SECRET=${API_SECRET}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows

  # ── Redis (caché Motor APU) ────────────────────────────────
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # ── Qdrant (BIM Intelligence — vector store) ──────────────
  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"   # REST + Dashboard → http://localhost:6333/dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

volumes:
  n8n_data:
  redis_data:
  qdrant_data:
