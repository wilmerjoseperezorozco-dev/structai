# ══════════════════════════════════════════════════════════════
# CI/CD — GitHub Actions (gratis hasta 2000 min/mes en repos privados)
# Trigger: push a master, Pull Requests
#
# Deploy: NO se hace aquí a propósito.
#   - apps/web ya está conectado por Git directo a Vercel (import nativo,
#     no vía Action) — cada push a master dispara su propio deploy solo.
#     Duplicarlo aquí con una acción de deploy causaría dos despliegues
#     compitiendo por la misma build.
#   - apps/api todavía no está desplegado (pendiente decidir Render vs
#     Cloud Run). Cuando se despliegue, se agrega un job de deploy aparte.
#   - Migraciones de Supabase: NO se automatizan aquí. La carpeta
#     infra/supabase/migrations/ solo tiene 1 migración vieja mientras el
#     schema real (motor_chunks, geopot_proyectos, etc.) se creó directo
#     en Supabase — correr `supabase db push --linked` contra eso sería
#     inseguro hasta que las migraciones reflejen el estado real.
# ══════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: 20
  PYTHON_VERSION: '3.12'

jobs:

  # ── 1. Lint + Type Check (apps/web) ─────────────────────────
  lint-web:
    name: 🔍 Lint & Type Check (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  # ── 2. Auditoría de dependencias (apps/web) ─────────────────
  # No bloquea el pipeline a propósito — decisión explícita del
  # 2026-07-13, no un olvido. Estado real ese día: 10 vulnerabilidades
  # (1 moderada + 9 altas), TODAS derivadas de solo 2 paquetes raíz:
  #   1. next 14.2.35 (arrastra postcss/glob/eslint-config-next) — el
  #      fix real es next 16.x, que en Next 15+ vuelve async cookies()/
  #      headers()/params/searchParams. Es una migración con QA propio,
  #      no un `npm audit fix --force` seguro de correr a ciegas.
  #   2. next-pwa (sin mantenimiento hace ~3 años) — arrastra
  #      workbox-build/rollup-plugin-terser/serialize-javascript (RCE).
  #      El reemplazo es @ducanh2912/next-pwa (fork mantenido), no un
  #      upgrade del mismo paquete.
  # Se reporta en cada corrida para que no se pierda de vista; quitar
  # `continue-on-error` una vez resueltas o explícitamente aceptadas.
  audit-web:
    name: 🛡️ npm audit (informativo)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }
      - run: npm ci
      - run: npm audit --audit-level=high

  # ── 3. Build (apps/web) ──────────────────────────────────────
  build-web:
    name: 🏗️ Build (web)
    runs-on: ubuntu-latest
    needs: [lint-web]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL:           ${{ secrets.NEXT_PUBLIC_API_URL }}

  # ── 4. Tests Python — motores con cobertura real ────────────
  # Cada paquete corre en SU PROPIO working-directory: todos tienen una
  # carpeta llamada literalmente "src", así que correr pytest desde la
  # raíz del repo colisiona el nombre de módulo entre paquetes (import
  # cacheado del primer "src" que se procesa, verificado localmente).
  #
  # motor-aquai, motor-geopot y motor-vias quedan FUERA a propósito: sus
  # carpetas tests/ existen pero están vacías — no hay nada que correr
  # todavía (gap real, no un olvido de este workflow).
  test-motores:
    name: 🧮 Tests Python — motores
    runs-on: ubuntu-latest
    strategy:
      matrix:
        paquete: [motor-apu, motor-deformacion, motor-topovia]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}' }
      - name: Instalar dependencias
        working-directory: packages/${{ matrix.paquete }}
        run: |
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Correr pytest
        working-directory: packages/${{ matrix.paquete }}
        run: pytest tests/ -v

  # ── 5. Tests de integración — apps/api (RAG, rate limit, health) ──
  test-api:
    name: 🧪 Tests de integración (apps/api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}' }
      - name: Instalar dependencias
        working-directory: apps/api
        run: pip install -r requirements.txt
      - name: Correr pytest
        working-directory: apps/api
        run: pytest -v
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
