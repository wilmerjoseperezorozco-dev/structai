# ══════════════════════════════════════════════════════════════
# CI/CD — GitHub Actions (gratis hasta 2000 min/mes en repos privados)
# Trigger: push a master, Pull Requests
#
# Deploy: NO se hace aquí a propósito.
#   - apps/web ya está conectado por Git directo a Vercel (import nativo,
#     no vía Action) — cada push a master dispara su propio deploy solo.
#     Duplicarlo aquí con una acción de deploy causaría dos despliegues
#     compitiendo por la misma build.
#   - apps/api todavía no está desplegado (pendiente decidir Render vs
#     Cloud Run). Cuando se despliegue, se agrega un job de deploy aparte.
#   - Migraciones de Supabase: NO se automatizan aquí. La carpeta
#     infra/supabase/migrations/ solo tiene 1 migración vieja mientras el
#     schema real (motor_chunks, geopot_proyectos, etc.) se creó directo
#     en Supabase — correr `supabase db push --linked` contra eso sería
#     inseguro hasta que las migraciones reflejen el estado real.
# ══════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: 20
  PYTHON_VERSION: '3.12'

jobs:

  # ── 1. Lint + Type Check (apps/web) ─────────────────────────
  lint-web:
    name: 🔍 Lint & Type Check (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  # ── 2. Auditoría de dependencias (apps/web) ─────────────────
  # No bloquea el pipeline todavía — hay vulnerabilidades conocidas sin
  # triage (ver hallazgo real del 2026-07-13: 7 vulnerabilidades, 1
  # moderada + 6 altas). Se reporta en cada corrida para que no se pierdan
  # de vista; quitar `continue-on-error` una vez estén resueltas o
  # explícitamente aceptadas.
  audit-web:
    name: 🛡️ npm audit (informativo)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }
      - run: npm ci
      - run: npm audit --audit-level=high

  # ── 3. Build (apps/web) ──────────────────────────────────────
  build-web:
    name: 🏗️ Build (web)
    runs-on: ubuntu-latest
    needs: [lint-web]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Diagnóstico temporal (no expone el valor, solo su forma)
        run: |
          echo "longitud NEXT_PUBLIC_SUPABASE_URL=${#NEXT_PUBLIC_SUPABASE_URL}"
          node -e "const u=process.env.NEXT_PUBLIC_SUPABASE_URL; console.log('bytes:', Buffer.byteLength(u||'')); console.log('primer char code:', u ? u.charCodeAt(0) : 'undefined'); console.log('ultimo char code:', u ? u.charCodeAt(u.length-1) : 'undefined'); try { new URL(u); console.log('URL valida: SI'); } catch(e) { console.log('URL valida: NO ->', e.message); }"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL:           ${{ secrets.NEXT_PUBLIC_API_URL }}

  # ── 4. Tests Python — motores con cobertura real ────────────
  # Cada paquete corre en SU PROPIO working-directory: todos tienen una
  # carpeta llamada literalmente "src", así que correr pytest desde la
  # raíz del repo colisiona el nombre de módulo entre paquetes (import
  # cacheado del primer "src" que se procesa, verificado localmente).
  #
  # motor-aquai, motor-geopot y motor-vias quedan FUERA a propósito: sus
  # carpetas tests/ existen pero están vacías — no hay nada que correr
  # todavía (gap real, no un olvido de este workflow).
  test-motores:
    name: 🧮 Tests Python — motores
    runs-on: ubuntu-latest
    strategy:
      matrix:
        paquete: [motor-apu, motor-deformacion, motor-topovia]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}' }
      - name: Instalar dependencias
        working-directory: packages/${{ matrix.paquete }}
        run: |
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Correr pytest
        working-directory: packages/${{ matrix.paquete }}
        run: pytest tests/ -v

  # ── 5. Tests de integración — apps/api (RAG, rate limit, health) ──
  test-api:
    name: 🧪 Tests de integración (apps/api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}' }
      - name: Instalar dependencias
        working-directory: apps/api
        run: pip install -r requirements.txt
      - name: Correr pytest
        working-directory: apps/api
        run: pytest -v
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
