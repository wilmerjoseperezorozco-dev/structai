# ══════════════════════════════════════════════════════════════
# CI/CD — GitHub Actions (GRATIS hasta 2000 min/mes)
# Trigger: push a main/develop, PRs
# Deploy: Vercel (web) + Render (api)
# ══════════════════════════════════════════════════════════════
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: 9
  NODE_VERSION: 20
  PYTHON_VERSION: '3.11'

jobs:

  # ── 1. Lint + Type Check ────────────────────────────────────
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm exec tsc --noEmit
        working-directory: apps/web

  # ── 2. Test Motor APU (Python) ──────────────────────────────
  test-apu:
    name: 🧮 Test Motor APU
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}' }
      - name: Install dependencies
        run: |
          cd packages/motor-apu
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run APU tests
        run: |
          cd packages/motor-apu
          pytest tests/ -v --cov=. --cov-report=xml
      - uses: codecov/codecov-action@v4
        with: { file: packages/motor-apu/coverage.xml }

  # ── 3. Build ────────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          API_SECRET:           ${{ secrets.API_SECRET }}
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: apps/web/.next

  # ── 4. Deploy Web → Vercel (solo main) ─────────────────────
  deploy-web:
    name: 🚀 Deploy Web → Vercel
    runs-on: ubuntu-latest
    needs: [build, test-apu]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/web
          vercel-args: '--prod'

  # ── 5. Deploy API → Render (solo main) ─────────────────────
  deploy-api:
    name: 🚀 Deploy API → Render
    runs-on: ubuntu-latest
    needs: [build, test-apu]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
        # En Render: Settings → Deploy Hook → copiar URL a RENDER_DEPLOY_HOOK secret

  # ── 6. Supabase Migrations (solo main) ─────────────────────
  migrate-db:
    name: 🗄️ Supabase Migrations
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with: { version: latest }
      - run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD:  ${{ secrets.SUPABASE_DB_PASSWORD }}
