[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bim-intelligence"
version = "0.1.0"
description = "Motor BIM: IfcOpenShell + MCP server + Qdrant para Construdata"
requires-python = ">=3.11"
dependencies = [
    # IFC / BIM
    "ifcopenshell>=0.7.0",
    # MCP
    "mcp>=1.0.0",
    "fastmcp>=0.1.0",
    # Qdrant
    "qdrant-client>=1.7.0",
    # Embeddings
    "openai>=1.54.4",
    "anthropic>=0.40.0",
    # Utils
    "numpy>=1.26.4",
    "pydantic>=2.9.2",
    "python-dotenv>=1.0.1",
    "rich>=13.0.0",
    "typer>=0.12.0",
    # InfraCortex (experimental — src/infracortex/, no conectado a apps/api)
    "torch>=2.13.0",
    "ultralytics>=8.4.0",
    "opencv-python>=5.0.0",
    "scipy>=1.18.0",
]

[project.scripts]
bim-mcp    = "bim_intelligence.mcp.server:main"
bim-ingest = "bim_intelligence.ingest.pipeline:main"
bim-setup  = "bim_intelligence.scripts.setup_qdrant:main"
