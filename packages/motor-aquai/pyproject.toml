[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "motor-aquai"
version = "0.1.0"
description = "Cálculos de acueducto y alcantarillado — RAS 2000 / Resolución 0330-2017 (11 módulos: población, caudales, redes, tratamiento PTAP/PTAR, tarifas CRA)"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.9.2",
    "reportlab>=4.0.0",
    # httpx + openai: usados solo por rag_normativo.py, un módulo previo
    # NUNCA conectado al flujo real (el RAG de producción usa embeddings
    # locales + Groq vía apps/api, no este módulo). Ver project_construdata.md.
    "httpx>=0.27.0",
    "openai>=1.54.4",
]

[project.optional-dependencies]
dev = ["pytest>=8.3.3"]
