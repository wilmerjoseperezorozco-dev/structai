[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "motor-gerencia"
version = "0.1.0"
description = "Gerencia de proyectos: Earned Value Management (PMBOK) + ML predictivo (riesgo, forecast, fecha de término, anomalías) sobre avance de obra"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.9.2",
]

[project.optional-dependencies]
dev = ["pytest>=8.3.3"]
