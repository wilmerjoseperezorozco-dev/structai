[project]
name = "ai-gateway"
version = "0.1.0"
description = "Gateway multi-proveedor: Claude + Gemini + OpenAI para Construdata"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.40.0",
    "google-generativeai>=0.8.0",
    "openai>=1.54.4",
    "python-dotenv>=1.0.1",
]
