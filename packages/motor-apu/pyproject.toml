[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "motor-apu"
version = "0.1.0"
description = "Cálculos de Análisis de Precios Unitarios (APU) — catálogo Construdata 2026 Barranquilla"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26.0",
    "scipy>=1.11.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.3.3"]
