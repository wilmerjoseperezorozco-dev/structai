[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "motor-deformacion"
version = "0.1.0"
description = "Análisis estructural: deformación de vigas (Euler-Bernoulli), pandeo de columnas (Euler/Johnson), incertidumbre Monte Carlo"
requires-python = ">=3.11"
dependencies = [
    "numpy==1.26.4",
    "scipy==1.13.1",
]

[project.optional-dependencies]
dev = ["pytest==8.3.3"]
