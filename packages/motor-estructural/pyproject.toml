[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "motor-estructural"
version = "0.1.0"
description = "Motor de análisis estructural INFRACORTEX para StructAI — BIM + PINN + NSR-10"
requires-python = ">=3.11"
dependencies = [
    "ifcopenshell>=0.8.0",
    "numpy>=2.0.0",
    "scipy>=1.12.0",
    "torch>=2.0.0",
    "opencv-python>=4.9.0",
    "ultralytics>=8.0.0",
    "pydantic>=2.0.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]
